version: '3.8'

services:
  skillbridge-db:
    image: postgres:15-alpine
    container_name: skillbridge_postgres
    environment:
      POSTGRES_USER: skillbridge_admin
      POSTGRES_PASSWORD: LocalDevSecurePassword2026
      POSTGRES_DB: skillbridge_platform
    ports:
      - "5432:5432"
    volumes:
      - skillbridge_pgdata:/var/lib/postgresql/data
    networks:
      - skillbridge-net

volumes:
  skillbridge_pgdata:

networks:
  skillbridge-net:
    driver: bridge